<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Laboral Admin</title>
  
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/pages.css">
  
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  
  <div class="app-layout">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <a href="/admin/dashboard.html" class="sidebar-header">
        <i data-lucide="book-open"></i>
        <span>Laboral</span>
      </a>
      
      <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" class="nav-item active"><i data-lucide="layout-dashboard"></i> <span>Dashboard</span></a>
        <a href="/admin/courses.html" class="nav-item"><i data-lucide="graduation-cap"></i> <span>Cursos</span></a>
        <a href="/admin/students.html" class="nav-item"><i data-lucide="users"></i> <span>Alunos</span></a>
        <a href="/admin/enrollments.html" class="nav-item"><i data-lucide="clipboard-list"></i> <span>Matrículas</span></a>
      </nav>

      <div class="sidebar-footer">
        <div data-user="avatar"></div>
        <div class="user-info">
          <span class="name" data-user="name">Carregando...</span>
          <span class="role" data-user="role">...</span>
        </div>
        <button id="logout-btn" class="icon-btn" title="Terminar Sessão"><i data-lucide="log-out"></i></button>
      </div>
    </aside>

    <main class="main-content">
      
      <!-- Top header -->
      <header class="top-header">
        <div class="flex items-center gap-4">
          <button class="mobile-toggle"><i data-lucide="menu"></i></button>
          <h2>Visão Geral</h2>
        </div>
        
        <div class="header-actions">
          <div class="header-search">
            <i data-lucide="search" class="text-gray"></i>
            <input type="text" placeholder="Pesquisar...">
          </div>
          <button class="icon-btn">
            <i data-lucide="bell"></i>
            <span class="badge-count">3</span>
          </button>
        </div>
      </header>

      <!-- Content -->
      <section class="page-content">
        <div class="page-header">
          <div>
            <h1 class="mb-4">Olá, <span data-user="name">Admin</span>! 👋</h1>
            <p class="text-gray">Aqui está o resumo da sua plataforma e-learning.</p>
          </div>
        </div>

        <!-- Metrics Grid -->
        <div class="grid-4 mb-4" id="metrics-container">
          <!-- Inject via JS -->
        </div>

        <div class="grid-3 mt-8">
          <!-- Left Col (Cursos) -->
          <div class="card md:col-span-2 lg:col-span-2">
            <div class="modal-header border-b">
              <h2>Últimos Cursos</h2>
              <a href="/admin/courses.html" class="text-sm">Ver todos</a>
            </div>
            <div class="data-table" style="border: none; border-radius: 0;">
               <div class="data-table-header cols-dashboard" style="border-top: none;">
                 <span>Curso</span>
                 <span>Categoria</span>
                 <span>Estado</span>
               </div>
               <div id="recent-courses-list"></div>
            </div>
          </div>

          <!-- Right Col (Activity) -->
          <div class="card">
            <div class="modal-header border-b">
              <h2>Actividade Recente</h2>
            </div>
            <div class="modal-body activity-feed" id="activity-feed">
               <!-- Inject via JS -->
            </div>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script type="module" src="/assets/js/dashboard.js"></script>
</body>
</html>
