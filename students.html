<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Alunos - Laboral Admin</title>
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/pages.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <a href="/dashboard.html" class="sidebar-header"><i data-lucide="book-open"></i><span>Laboral</span></a>
      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i> <span>Dashboard</span></a>
        <a href="/courses.html" class="nav-item"><i data-lucide="graduation-cap"></i> <span>Cursos</span></a>
        <a href="/students.html" class="nav-item active"><i data-lucide="users"></i> <span>Alunos</span></a>
        <a href="/enrollments.html" class="nav-item"><i data-lucide="clipboard-list"></i> <span>Matrículas</span></a>
      </nav>
      <div class="sidebar-footer">
        <div data-user="avatar"></div>
        <div class="user-info"><span class="name" data-user="name">Admin</span></div>
        <button id="logout-btn" class="icon-btn"><i data-lucide="log-out"></i></button>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-header">
        <div class="flex items-center gap-4"><button class="mobile-toggle"><i data-lucide="menu"></i></button><h2>Alunos</h2></div>
      </header>

      <section class="page-content">
        <div class="page-header">
          <div><h1 class="mb-4">Gestão de Alunos</h1><p class="text-gray" id="total-students">0 Alunos</p></div>
          <button class="btn btn-primary" onclick="openStudentModal()"><i data-lucide="plus"></i> Novo Aluno</button>
        </div>

        <div class="data-table">
          <div class="data-table-header" style="grid-template-columns: 2fr 1fr 1fr 1fr 1fr;">
             <span>Nome & Email</span>
             <span>Registo</span>
             <span>Último Acesso</span>
             <span>Estado</span>
             <span>Acções</span>
          </div>
          <div id="students-table-body"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-student">
    <div class="modal">
      <div class="modal-header"><h2>Novo Aluno</h2><button class="modal-close"><i data-lucide="x"></i></button></div>
      <form id="student-form">
        <div class="modal-body">
           <div class="form-group"><label>Nome Completo *</label><input type="text" id="s-name" class="form-control" required></div>
           <div class="form-group"><label>Email *</label><input type="email" id="s-email" class="form-control" required></div>
           <div class="form-group"><label>Password (Gerar)*</label><input type="text" id="s-pass" class="form-control" value="padrao123" required></div>
           <div class="form-group"><label>Empresa</label><input type="text" id="s-company" class="form-control"></div>
        </div>
        <div class="modal-footer"><button type="submit" class="btn btn-primary">Gravar Aluno</button></div>
      </form>
    </div>
  </div>

  <script type="module" src="/assets/js/students.js"></script>
</body>
</html>
