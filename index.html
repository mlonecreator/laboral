<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboral - Login</title>
  
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/pages.css">
  
  <!-- Ícones -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  
  <div class="login-page">
    <div class="login-container card">
      <div class="login-header">
        <h1>Laboral</h1>
        <p>Aprenda. Cresça. Evolua.</p>
      </div>

      <div class="tabs">
        <div class="tab active" data-role="student">Aluno</div>
        <div class="tab" data-role="admin">Admin</div>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
        </div>
        
        <div class="form-group mb-4">
          <label>Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%" id="login-btn">
          Entrar
        </button>
      </form>
      
      <div style="text-align: center; margin-top: 24px;">
        <span class="text-sm text-gray">Admin Demo: admin@laboral.ao / admin</span><br>
        <span class="text-sm text-gray">Aluno Demo: joao.baptista@gmail.com / password123</span>
      </div>
    </div>
  </div>

  <script type="module" src="/assets/js/login.js"></script>
</body>
</html>
